# yaml-language-server: $schema=https://astropods.ai/schema/package.json
spec: package/v1
name: ayda

agent:
  build:
    context: .
    dockerfile: Dockerfile
  interfaces:
    # Serves the built-in AG-UI client + the SSE/HTTP API publicly from the
    # container's port 80. Any AG-UI client (CopilotKit, custom) can also point
    # at {ASTRO_EXTERNAL_AGENT_URL}/sessions/... directly.
    frontend: true
    # Also deploy the platform's messaging sidecar (chat UI / Slack). The sidecar
    # runs the channel adapters, normalizes every inbound message to one shape,
    # and streams it to us over gRPC (GRPC_SERVER_ADDR). agent/messaging/adapter.ts
    # (a Claude Code AgentAdapter) + adapter-core `serve()` handle our side, so a
    # Slack thread becomes a continuous Claude Code conversation. Slack itself is
    # platform-managed (its app + workspace linking + user identity live in
    # astro-server) — this agent needs NO Slack tokens. frontend + messaging
    # coexist: our UI on its hostname, Slack/web on the sidecar's routes.
    messaging: true
  # Route model calls through the Astro AI Gateway instead of a personal key.
  # Injects ASTRO_GATEWAY_URL + ASTRO_GATEWAY_API_KEY (virtual key). config/model.ts
  # maps these to the gateway's /anthropic endpoint (→ Bedrock). Opt out per-deploy
  # by setting the optional ANTHROPIC_API_KEY input below — that bypasses the
  # gateway and calls Anthropic directly.
  astro_ai_gateway: true

inputs:
  # GitHub App provisioning is chat-driven. List the messaging user IDs allowed
  # to run `/setup-github` (comma-separated). That directive walks GitHub's
  # App-Manifest flow — it creates a correctly-configured GitHub App (callback,
  # permissions) in a couple clicks and stores its OAuth credentials in the DB.
  # No manual App registration, no client id/secret to copy. Regular users then
  # connect their own GitHub with `/connect-github`. Leave unset and no one can
  # provision the App (GitHub stays disabled). The ID is the sidecar userId — for
  # linked Slack users this is the Astro user ID. Unsure which value to list? DM
  # the agent `/whoami` and it reports your userId.
  ADMIN_USER_IDS:
    name: ADMIN_USER_IDS
    datatype: string
    description: "Comma-separated messaging user IDs allowed to run /setup-github"
    display-as: short-text
  # Optional opt-out of the Astro AI Gateway (see astro_ai_gateway above). Provide
  # your own Anthropic API key and model calls go DIRECTLY to api.anthropic.com
  # with it, bypassing the gateway/Bedrock. Leave unset to use the gateway
  # (default). In config/model.ts a set ANTHROPIC_API_KEY takes precedence over the
  # injected ASTRO_GATEWAY_* and switches claudeSpawnEnv to direct mode.
  ANTHROPIC_API_KEY:
    name: ANTHROPIC_API_KEY
    datatype: string
    secret: true
    description: "Optional: use this Anthropic API key directly and bypass the Astro AI Gateway"
    display-as: short-text

knowledge:
  # Durable store for per-user GitHub OAuth tokens (access + refresh + expiry)
  # and other per-interaction state. Platform-managed Postgres injects
  # POSTGRES_HOST/PORT/USER/PASSWORD/DB. (If provider-mode injection misbehaves,
  # fall back to container mode — see the migrate-to-astropods notes.)
  db:
    provider: postgres

dev:
  # Local hot-reload path (`ast dev` / `ast project`): runs the agent in a
  # container that bind-mounts the `agent/` source dir, so edits reload live via
  # node --watch. (Source lives in agent/ so it lands under the mounted path.)
  command: node --watch agent/index.ts
  interfaces:
    frontend:
      port: 8080
    # Local playground adapters for `ast dev`. `web` = built-in chat UI; add
    # `slack` to exercise the Slack channel locally. (Deploy-time Slack is
    # governed by agent.interfaces.messaging + platform Slack config, not this.)
    messaging:
      adapters: [web, slack]
