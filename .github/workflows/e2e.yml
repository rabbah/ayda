name: e2e

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24" # >= 23 for native TypeScript type-stripping

      # The server boots on Node alone (all external deps are dynamically imported
      # and guarded), so this is really just for @playwright/test. If the private
      # @astropods/* packages aren't reachable, configure a registry/token here.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm test
        env:
          CI: "true"

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
